<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweepstouch — Raffle Drum</title>
<style>
  :root{
    --st-magenta:#F5087E;
    --bg-deep:#8a0345;
    --bg-mid:#c00458;
    --gold-1:#f9e08a;
    --gold-2:#d4a63b;
    --gold-3:#8a6a1d;
    --gold-dark:#3d2f0c;
    --panel:#1e1503;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;}
  body{
    font-family:"Segoe UI", Arial, sans-serif;
    background:radial-gradient(ellipse at 50% 35%, var(--bg-mid) 0%, var(--bg-deep) 60%, #5c022e 100%);
    display:flex;align-items:center;justify-content:center;
    user-select:none;
  }

  /* ============ FRAME ============ */
  .stage{position:fixed;inset:0;width:100vw;height:100vh;}
  .frame{
    position:absolute;inset:28px;
    border-radius:48px;
    border:4px solid #ff2f92;
    box-shadow:
      0 0 18px 4px rgba(255,47,146,.8),
      0 0 60px 10px rgba(245,8,126,.45),
      inset 0 0 24px 4px rgba(255,47,146,.55);
  }
  .frame-gold{
    position:absolute;inset:48px;
    border-radius:36px;
    border:5px solid var(--gold-2);
    box-shadow:
      inset 0 0 0 2px var(--gold-3),
      0 0 0 2px var(--gold-3),
      inset 0 0 40px rgba(0,0,0,.35);
  }
  .bulb{
    position:absolute;width:18px;height:18px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #ffffff 0%, #fff3c4 35%, #ffd76e 70%, #d4a63b 100%);
    box-shadow:
      0 0 8px 3px rgba(255,248,220,1),
      0 0 20px 8px rgba(255,225,140,.95),
      0 0 44px 16px rgba(255,205,110,.55),
      0 0 70px 26px rgba(255,190,90,.25);
    animation:twinkle 1.65s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{filter:brightness(1.35);opacity:1;}
    45%{filter:brightness(.45);opacity:.45;}
    65%{filter:brightness(1.75);opacity:1;}
  }

  .draw-header{
    position:absolute;left:50%;top:clamp(32px,7.2vh,92px);transform:translateX(-50%);
    z-index:22;width:min(1200px,82vw);text-align:center;color:#fff;pointer-events:none;
  }
  .draw-logo{
    width:min(784px,58.8vw);height:clamp(76px,8.4vw,129px);margin:0 auto;
    background:url("/sweepstouch-logo-white.png") center/contain no-repeat;
    filter:drop-shadow(0 0 10px rgba(255,255,255,.9)) drop-shadow(0 0 24px rgba(245,8,126,.95)) drop-shadow(0 0 38px rgba(249,224,138,.38));
  }
  .draw-store{
    margin-top:10px;font-size:clamp(14px,1.4vw,24px);font-weight:800;text-shadow:0 0 10px rgba(0,0,0,.55);
    max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }

  /* ============ DRUM (marco dorado PNG + cilindro de vidrio) ============ */
  .drum-wrap{
    position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);
    width:min(1280px, 88vw, 132vh);
    aspect-ratio:2437/1376;
  }
  .marco-img{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:contain;z-index:8;pointer-events:none;
    filter:drop-shadow(0 18px 30px rgba(0,0,0,.45));
  }
  .cylinder{
    position:absolute;left:13.5%;top:7.4%;width:73%;height:68.8%;
  }
  .cyl-body{
    position:absolute;inset:0;
    border-radius:13% / 50%;
    background:linear-gradient(180deg,
      rgba(255,255,255,.30) 0%,
      rgba(255,214,235,.14) 22%,
      rgba(255,190,225,.10) 55%,
      rgba(255,255,255,.20) 100%);
    border:2px solid rgba(255,255,255,.55);
    box-shadow:
      inset 0 10px 30px rgba(255,255,255,.35),
      inset 0 -14px 30px rgba(190,0,95,.25),
      0 0 60px 14px rgba(255,150,205,.6),
      0 0 130px 34px rgba(255,90,170,.35),
      0 30px 60px -18px rgba(255,120,190,.8);
    overflow:hidden;
  }
  .cyl-inner-glow{
    position:absolute;inset:0;border-radius:13% / 50%;
    background:radial-gradient(ellipse at 50% 45%, rgba(255,225,242,.65) 0%, rgba(255,180,220,.25) 55%, transparent 82%);
    pointer-events:none;
  }
  .cyl-axis{
    position:absolute;left:0;right:0;top:50%;height:4px;transform:translateY(-50%);
    background:linear-gradient(180deg,rgba(255,255,255,.85),rgba(160,160,170,.5) 60%,rgba(90,90,100,.4));
    border-radius:3px;opacity:.55;z-index:4;pointer-events:none;
  }
  .cyl-shine{
    position:absolute;left:10%;top:5%;width:80%;height:24%;
    border-radius:50%;
    background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,0));
    filter:blur(4px);z-index:4;pointer-events:none;
  }
  .cyl-shine2{
    position:absolute;right:6%;top:14%;width:10%;height:58%;
    border-radius:50%;
    background:linear-gradient(200deg,rgba(255,255,255,.5),rgba(255,255,255,0) 70%);
    filter:blur(5px);z-index:4;pointer-events:none;
  }
  .under-glow{
    position:absolute;left:16%;right:16%;bottom:14%;height:8%;
    border-radius:50%;
    background:radial-gradient(ellipse, rgba(255,190,225,.9), rgba(255,120,190,.35) 60%, transparent 80%);
    filter:blur(10px);z-index:1;pointer-events:none;
  }
  #itemsLayer{position:absolute;inset:0;z-index:5;}

  /* ---- items ---- */
  .item{position:absolute;will-change:transform;}
  .ticket{
    width:120px;height:58px;border-radius:6px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 3px 8px rgba(0,0,0,.28);
    border:2px dashed rgba(0,0,0,.18);
    font-weight:800;letter-spacing:.4px;text-align:center;line-height:1;
  }
  .ticket .brand{font-size:15px;text-transform:uppercase;}
  .ticket .num{font-size:11px;margin-top:4px;font-weight:600;letter-spacing:2px;opacity:.85;}
  .t-magenta{background:#e0176f;color:#fff;border-color:rgba(255,255,255,.55);}
  .t-cream{
    background:url("/winner-ticket.png") center/contain no-repeat;
    color:transparent;border-color:transparent;box-shadow:0 4px 10px rgba(0,0,0,.28);
  }
  .t-white{background:#fdf3f8;color:#e0176f;border-color:rgba(224,23,111,.4);}
  .t-teal{
    background:url("/winner-ticket.png") center/contain no-repeat;
    color:transparent;border-color:transparent;box-shadow:0 4px 10px rgba(0,0,0,.28);
  }
  .t-cream .brand,.t-cream .num,.t-teal .brand,.t-teal .num{display:none;}
  .ball{
    width:56px;height:56px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:19px;color:#333;
    box-shadow:inset -5px -8px 12px rgba(0,0,0,.25), inset 6px 8px 10px rgba(255,255,255,.65), 0 4px 8px rgba(0,0,0,.3);
  }
  .ball .n{background:rgba(255,255,255,.85);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;}

  /* ============ CONTROLS ============ */
  .controls{
    position:absolute;left:50%;bottom:8vh;transform:translateX(-50%);
    display:flex;flex-direction:column;gap:16px;align-items:center;z-index:20;
  }
  .row{display:flex;gap:22px;}
  .btn{
    min-width:clamp(128px,9vw,170px);padding:clamp(10px,1.1vw,14px) clamp(16px,1.8vw,26px);border-radius:999px;cursor:pointer;
    font-family:inherit;font-size:clamp(15px,1.05vw,19px);font-weight:900;letter-spacing:.5px;color:var(--st-magenta);
    background:linear-gradient(180deg,#ffffff 0%,#fff7fb 52%,#ffffff 100%);
    border:2px solid var(--gold-1);
    text-transform:none;
    box-shadow:
      0 0 0 1px rgba(212,166,59,.72),
      0 0 14px 3px rgba(249,224,138,.72),
      0 0 30px 8px rgba(212,166,59,.38),
      0 8px 18px rgba(0,0,0,.28),
      inset 0 1px 2px rgba(255,255,255,.85);
    transition:transform .12s ease, box-shadow .12s ease, background .2s;
  }
  .btn:hover{
    transform:translateY(-2px);
    box-shadow:
      0 0 0 1px rgba(255,238,170,.95),
      0 0 20px 5px rgba(249,224,138,.95),
      0 0 42px 12px rgba(212,166,59,.55),
      0 10px 20px rgba(0,0,0,.32),
      inset 0 1px 2px rgba(255,255,255,.9);
  }
  .btn:active{transform:translateY(1px);}
  .btn.active{
    background:linear-gradient(180deg,#ff2f92 0%,var(--st-magenta) 55%,#c00458 100%);
    color:#ffffff;border-color:var(--gold-1);
    box-shadow:
      0 0 0 1px rgba(255,238,170,1),
      0 0 24px 6px rgba(249,224,138,1),
      0 0 46px 14px rgba(212,166,59,.58),
      inset 0 1px 2px rgba(255,255,255,.95);
  }
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
  #mBallsNum,#mBalls,#mTickets,#btnDestroy{display:none;}

  /* ============ WINNER ============ */
  .winner-overlay{
    position:fixed;inset:0;background:rgba(60,0,32,.78);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:50;
  }
  .winner-overlay.show{display:flex;}
  .winner-card{
    position:relative;
    width:min(94vw,1500px);
    aspect-ratio:1741/874;
    background:url("/winner-ticket.png") center/contain no-repeat;
    border:0;padding:0;text-align:center;color:#d80768;
    filter:drop-shadow(0 0 28px rgba(245,8,126,.75)) drop-shadow(0 18px 34px rgba(0,0,0,.45));
    animation:pop .45s cubic-bezier(.2,1.6,.4,1);
  }
  @keyframes pop{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
  .winner-card h2{display:none;}
  .winner-card .big{
    position:absolute;left:29%;top:45%;width:69%;height:27%;
    display:flex;align-items:center;justify-content:center;margin:0;
    font-size:clamp(46px,6.4vw,108px);font-weight:950;letter-spacing:.02em;line-height:1;
    color:#d80768;text-shadow:0 2px 0 #ffffff,0 0 12px rgba(245,8,126,.35);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .winner-card p{display:none;}
  .winner-card .close{
    display:none;
  }
  #confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:60;}

  .counter{
    position:absolute;top:clamp(122px,17.5vh,190px);left:50%;transform:translateX(-50%);
    color:var(--gold-1);letter-spacing:2px;font-size:clamp(10px,.9vw,15px);font-weight:900;text-transform:uppercase;z-index:20;
    text-shadow:0 0 12px rgba(255,215,92,.55),0 0 10px rgba(0,0,0,.5);
    white-space:nowrap;
  }
  .counter b{color:#fff;font-size:1.08em;}

  @media (max-height:950px){
    .frame{inset:22px;border-radius:42px;}
    .frame-gold{inset:42px;border-radius:32px;}
    .draw-header{top:clamp(26px,5.5vh,58px);width:min(980px,76vw);}
    .draw-logo{width:min(644px,53.2vw);height:clamp(64px,7vw,104px);}
    .draw-store{margin-top:8px;font-size:clamp(13px,1.25vw,20px);}
    .counter{top:clamp(96px,15.2vh,142px);font-size:clamp(10px,.85vw,13px);letter-spacing:1.5px;}
    .drum-wrap{top:54%;width:min(1120px,82vw,116vh);}
    .controls{bottom:6.2vh;}
    .row{gap:18px;}
  }

  @media (max-height:760px){
    .frame{inset:14px;border-radius:32px;border-width:3px;}
    .frame-gold{inset:30px;border-radius:24px;border-width:4px;}
    .bulb{width:14px;height:14px;}
    .draw-header{top:clamp(20px,4vh,34px);width:78vw;}
    .draw-logo{width:min(504px,47.6vw);height:clamp(53px,6.4vw,81px);}
    .draw-store{margin-top:6px;font-size:clamp(12px,1.1vw,17px);}
    .counter{top:clamp(72px,12.5vh,96px);font-size:clamp(9px,.85vw,11px);letter-spacing:1.2px;}
    .drum-wrap{top:54%;width:min(980px,80vw,105vh);}
    .controls{bottom:4.5vh;}
    .row{gap:12px;}
    .btn{min-width:118px;padding:9px 16px;font-size:14px;}
  }

  @media (max-width:900px){
    .frame{inset:16px;border-radius:30px;}
    .frame-gold{inset:30px;border-radius:22px;}
    .draw-header{top:clamp(18px,4.5vh,42px);width:82vw;}
    .draw-logo{width:min(448px,81vw);height:clamp(56px,15.4vw,87px);}
    .draw-store{font-size:clamp(12px,3.1vw,18px);}
    .counter{top:clamp(78px,13vh,110px);font-size:clamp(9px,2vw,11px);letter-spacing:1px;}
    .drum-wrap{top:55%;width:min(112vw,880px,86vh);}
    .controls{bottom:5vh;width:88vw;}
    .btn{min-width:112px;font-size:14px;padding:10px 14px;}
    .row{gap:10px;flex-wrap:wrap;justify-content:center;}
  }

  @media (max-width:560px){
    .frame{inset:10px;border-radius:24px;}
    .frame-gold{inset:22px;border-radius:18px;border-width:3px;}
    .draw-header{top:clamp(14px,3.4vh,26px);width:76vw;}
    .draw-logo{width:min(364px,86vw);height:clamp(48px,16.8vw,70px);}
    .draw-store{margin-top:5px;font-size:clamp(11px,3.3vw,15px);}
    .counter{top:clamp(62px,11.5vh,86px);font-size:clamp(8px,2.3vw,10px);letter-spacing:.8px;}
    .drum-wrap{top:52%;width:min(126vw,78vh);}
    .controls{bottom:3.4vh;width:84vw;}
    .btn{min-width:94px;padding:8px 11px;font-size:12px;letter-spacing:.2px;}
    .row{gap:8px;}
  }
</style>
</head>
<body>

<div class="stage">
  <div class="frame"></div>
  <div class="frame-gold"></div>
  <div id="bulbs"></div>

  <div class="draw-header">
    <div class="draw-logo" aria-label="SweepsTouch"></div>
  </div>

  <div class="counter">Participants: <b id="countLabel">0</b></div>

  <div class="drum-wrap">
    <div class="under-glow"></div>
    <div class="cylinder">
      <div class="cyl-body">
        <div class="cyl-inner-glow"></div>
        <div id="itemsLayer"></div>
      </div>
      <div class="cyl-axis"></div>
      <div class="cyl-shine"></div>
      <div class="cyl-shine2"></div>
    </div>
    <img class="marco-img" id="marcoImg" alt="" />
  </div>

  <div class="controls">
    <div class="row">
      <button class="btn" id="btnToggle">Start Spin</button>
      <button class="btn" id="btnStop">Stop Spin</button>
      <button class="btn" id="btnResult">Show Result</button>
    </div>
    <div class="row">
      <button class="btn mode" data-mode="balls-num" id="mBallsNum">Bolas con número</button>
      <button class="btn mode" data-mode="balls" id="mBalls">Bolas sin número</button>
      <button class="btn mode active" data-mode="tickets" id="mTickets">Tickets</button>
      <button class="btn" id="btnDestroy" disabled>Destroy</button>
    </div>
  </div>
</div>

<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-card">
    <h2>¡Ganador!</h2>
    <div class="big" id="winnerNumber">—</div>
    <p>Sweepstouch · The Winning Tickets</p>
    <button class="close" id="btnCloseWinner">Cerrar</button>
  </div>
</div>

<canvas id="confettiCanvas"></canvas>

<script>
(function(){
  "use strict";

  /* ================= CONFIG ================= */
  var RAFFLE_DATA   = window.SWEEPSTOUCH_RAFFLE_DATA || {};
  var PARTICIPANTS  = Array.isArray(RAFFLE_DATA.participants) ? RAFFLE_DATA.participants : [];
  var TOTAL_ITEMS   = Math.max(200, PARTICIPANTS.length || 0);     // cantidad de elementos en el tambor (a reventar)
  var GRAVITY       = 0.30;
  var TUMBLE_SPEED  = 0.032;   // velocidad base del volteo durante el giro
  var DAMP_WALL     = 0.40;    // rebote contra paredes
  var AIR_FRICTION  = 0.99;
  var GROUND_FRICTION = 0.90;

  var TICKET_STYLES = ["t-magenta","t-cream","t-white","t-teal"];
  var BALL_COLORS   = ["#f5087e","#ffd166","#67c6ac","#fdf3f8","#ff8fc2","#efe3c2"];

  /* ================= STATE ================= */
  var layer = document.getElementById("itemsLayer");
  var items = [];              // {el, x, y, vx, vy, rot, vr, w, h, num, alive}
  var spinning = false;
  var stopping = false;
  var spinPower = 0;
  var mode = "tickets";
  var lastWinner = null;
  var pendingWinner = null;
  var W = 0, H = 0;

  function formatFallbackPhone(num){
    var value = String(num).padStart(6,"0");
    return "Nº " + value;
  }

  function participantAt(index){
    if(PARTICIPANTS.length === 0){
      return { phoneNumber: formatFallbackPhone(index + 1), ticketNumber: String(index + 1).padStart(6,"0"), storeName: "" };
    }
    var p = PARTICIPANTS[index % PARTICIPANTS.length] || {};
    var phone = p.phoneNumber || p.phone || formatFallbackPhone(index + 1);
    return {
      phoneNumber: phone,
      ticketNumber: p.ticketNumber || String(phone).replace(/\D/g,"").slice(-6).padStart(6,"0"),
      storeName: p.storeName || RAFFLE_DATA.storeName || ""
    };
  }

  function applyRaffleData(){
    var storeEl = document.getElementById("storeNameLabel");
    if(storeEl) storeEl.textContent = RAFFLE_DATA.storeName || "Supermercado participante";
    var titleEl = document.getElementById("sweepstakeTitleLabel");
    if(titleEl) titleEl.textContent = RAFFLE_DATA.title || "Sorteo";
    document.getElementById("countLabel").textContent = RAFFLE_DATA.participantCount || PARTICIPANTS.length || TOTAL_ITEMS;
  }

  function measure(){
    W = layer.clientWidth;
    H = layer.clientHeight;
    if(!W || !H){
      var rect = layer.getBoundingClientRect();
      W = rect.width || 900;
      H = rect.height || 520;
    }
  }

  /* ================= BUILD ITEMS ================= */
  function makeTicket(num){
    var participant = participantAt(num - 1);
    var d = document.createElement("div");
    d.className = "item ticket " + TICKET_STYLES[num % TICKET_STYLES.length];
    d.innerHTML = '<div class="brand">Sweeps<br>Touch</div><div class="num">'+participant.ticketNumber+'</div>';
    return {el:d, w:120, h:58, participant: participant};
  }
  function makeBall(num, numbered){
    var d = document.createElement("div");
    d.className = "item ball";
    d.style.background = "radial-gradient(circle at 32% 28%, #ffffff 0%, " + BALL_COLORS[num % BALL_COLORS.length] + " 55%)";
    d.innerHTML = numbered ? '<div class="n">'+num+'</div>' : "";
    return {el:d, w:56, h:56};
  }

  function buildItems(){
    layer.innerHTML = "";
    items = [];
    measure();
    for(var i=1;i<=TOTAL_ITEMS;i++){
      var made = (mode === "tickets") ? makeTicket(i)
               : makeBall(i, mode === "balls-num");
      var it = {
        el: made.el, w: made.w, h: made.h, num: i, alive: true, participant: made.participant,
        baseX: W*0.08 + Math.random()*W*0.84,
        x: W*0.08 + Math.random()*W*0.84,
        y: H*0.06 + Math.random()*H*0.88,
        rest: 0,
        restX: 0,
        restY: 0,
        vx: (Math.random()-0.5)*4,
        vy: (Math.random()-0.5)*4,
        rot: Math.random()*360,
        vr: (Math.random()-0.5)*6,
        // órbita propia para el giro: radio, ángulo y velocidad angular
        orb: { r: 0.72 + Math.random()*0.34, th: Math.random()*Math.PI*2, om: TUMBLE_SPEED + Math.random()*TUMBLE_SPEED*0.9 }
      };
      layer.appendChild(made.el);
      items.push(it);
    }
    assignRest(true);
    lastWinner = null;
    document.getElementById("btnDestroy").disabled = true;
    updateCount();
    renderItems();
  }

  // Reparte los "pisos" de reposo de abajo hacia arriba según la posición
  // actual de cada elemento: el que va más abajo aterriza más abajo.
  // Resultado: una pila continua y compacta, sin tickets flotando.
  function assignRest(snap){
    var alive = items.filter(function(a){return a.alive;});
    if(alive.length === 0) return;
    var sorted = alive.slice().sort(function(a,b){return a.num - b.num;});
    var rows = Math.max(5, Math.floor(H / 42));
    var cols = Math.max(1, Math.ceil(sorted.length / rows));
    var left = W * 0.07;
    var right = W * 0.93;
    var top = H * 0.06;
    var bottom = H * 0.96;
    for(var i=0;i<sorted.length;i++){
      var row = i % rows;
      var col = Math.floor(i / rows);
      sorted[i].restX = left + ((col + 0.5) / cols) * (right - left) + (Math.random() - 0.5) * 34;
      sorted[i].restY = top + ((row + 0.5) / rows) * (bottom - top) + (Math.random() - 0.5) * 24;
      sorted[i].restX = Math.max(left, Math.min(right, sorted[i].restX));
      sorted[i].restY = Math.max(top, Math.min(bottom, sorted[i].restY));
      sorted[i].rest = H - sorted[i].restY;
      if(snap){
        sorted[i].x = sorted[i].restX;
        sorted[i].y = sorted[i].restY;
      }
    }
  }

  function updateCount(){
    var n = PARTICIPANTS.length || items.filter(function(i){return i.alive;}).length;
    document.getElementById("countLabel").textContent = n;
  }

  function renderItems(){
    for(var i=0;i<items.length;i++){
      var it = items[i];
      if(!it.alive) continue;
      it.el.style.transform = "translate(" + (it.x - it.w/2) + "px," + (it.y - it.h/2) + "px) rotate(" + it.rot + "deg)";
    }
  }

  /* ================= PHYSICS ================= */
  // Contenedor: rectángulo con extremos redondeados (cápsula horizontal)
  function step(){
    var cx = W/2, cy = H/2;
    if(stopping){
      spinPower *= 0.985;
      if(spinPower < 0.02){
        spinPower = 0;
        spinning = false;
        stopping = false;
        assignRest();
        document.getElementById("btnToggle").classList.remove("active");
        document.getElementById("btnStop").classList.remove("active");
        if(pendingWinner){
          showWinner(pendingWinner);
          pendingWinner = null;
        }
      }
    }
    for(var i=0;i<items.length;i++){
      var it = items[i];
      if(!it.alive) continue;

      var halfW = Math.max(it.w, it.h)/2 * 0.72; // radio aprox del item

      if(spinning || spinPower > 0.01){
        // ===== GIRO: cada ticket sigue su propia órbita elíptica =====
        // Las órbitas cubren TODO el tambor (izquierda, centro y derecha),
        // así que nunca queda un lado vacío.
        var power = Math.max(spinPower, 0.02);
        it.orb.th += it.orb.om * power;
        var ay = H/2 - halfW*1.05;
        var column = it.baseX || it.x || cx;
        var tx = column + Math.sin(it.orb.th*2.2 + it.num)*32 + Math.sin(it.orb.th*0.6 + it.num)*14;
        var ty = cy + Math.sin(it.orb.th)*ay*Math.min(1.08, it.orb.r);
        // seguimiento suave hacia la órbita (guarda velocidad para la caída al detener)
        it.vx = (tx - it.x)*0.12*Math.max(power, 0.08);
        it.vy = (ty - it.y)*0.12*Math.max(power, 0.08);
        it.x += it.vx;
        it.y += it.vy;
        it.vr += (Math.random()-0.5)*0.8*Math.max(power, 0.08);
        it.vr = Math.max(-6, Math.min(6, it.vr));
        it.rot += it.vr * Math.max(power, 0.08);
        var depth = (Math.cos(it.orb.th) + 1) / 2;
        var scale = 0.82 + depth * 0.30;
        it.el.style.zIndex = String(Math.round(depth * 100));
        it.el.style.transform = "translate(" + (it.x - it.w/2) + "px," + (it.y - it.h/2) + "px) rotate(" + it.rot + "deg) scale(" + scale + ")";
        continue;
      }

      var targetX = it.restX || it.x;
      var targetY = it.restY || it.y;
      it.vx += (targetX - it.x) * 0.035;
      it.vy += (targetY - it.y) * 0.035;
      it.vx *= 0.82;
      it.vy *= 0.82;
      it.x += it.vx;
      it.y += it.vy;
      it.rot += it.vr;
      it.vr *= 0.96;

      var idleTop = halfW * 0.32, idleBottom = H - halfW * 0.22;
      if(it.y < idleTop){ it.y = idleTop; it.vy = Math.abs(it.vy)*DAMP_WALL; }
      if(it.y > idleBottom){
        it.y = idleBottom;
        it.vy = -Math.abs(it.vy)*DAMP_WALL;
        it.vx *= GROUND_FRICTION;
        if(Math.abs(it.vy) < 1.2) it.vy = 0;
      }
      if(it.x < halfW){ it.x = halfW; it.vx = Math.abs(it.vx)*DAMP_WALL; }
      if(it.x > W - halfW){ it.x = W - halfW; it.vx = -Math.abs(it.vx)*DAMP_WALL; }

      it.el.style.transform = "translate(" + (it.x - it.w/2) + "px," + (it.y - it.h/2) + "px) rotate(" + it.rot + "deg)";
      continue;

      // ===== SIN GIRO: física de caída por gravedad =====
      it.vy += GRAVITY;

      it.vx *= AIR_FRICTION;
      it.vy *= AIR_FRICTION;
      it.x += it.vx;
      it.y += it.vy;
      it.rot += it.vr;
      if(!spinning) it.vr *= 0.96;

      // colisiones con la cápsula
      // en reposo cada elemento tiene su propio "piso" para formar una pila con volumen
      var restOffset = spinning ? 0 : it.rest;
      var top = halfW, bottom = H - halfW - restOffset;

      // paredes rectas arriba/abajo (zona central plana)
      if(it.y < top){ it.y = top; it.vy = Math.abs(it.vy)*DAMP_WALL; }
      if(it.y > bottom){
        it.y = bottom;
        it.vy = -Math.abs(it.vy)*DAMP_WALL;
        it.vx *= GROUND_FRICTION;
        if(Math.abs(it.vy) < 1.2) it.vy = 0;
      }

      // extremos ELÍPTICOS: coinciden con el border-radius 13%/50% del vidrio
      var RX = W*0.13, RY = H*0.5;
      var mx = halfW*0.5, my = halfW*0.6; // margen del item dentro de la curva
      var endCx = null;
      if(it.x < RX){ endCx = RX; }
      else if(it.x > W - RX){ endCx = W - RX; }
      if(endCx !== null){
        var ex = (it.x - endCx)/(RX - mx);
        var ey = (it.y - cy)/(RY - my);
        var dEl = ex*ex + ey*ey;
        if(dEl > 1){
          var s = 1/Math.sqrt(dEl);
          it.x = endCx + ex*s*(RX - mx);
          it.y = cy + ey*s*(RY - my);
          // normal aproximada de la elipse
          var nnx = ex/(RX - mx), nny = ey/(RY - my);
          var nl = Math.sqrt(nnx*nnx + nny*nny) || 1;
          nnx/=nl; nny/=nl;
          var dot = it.vx*nnx + it.vy*nny;
          it.vx = (it.vx - 2*dot*nnx) * DAMP_WALL;
          it.vy = (it.vy - 2*dot*nny) * DAMP_WALL;
        }
      }

      it.el.style.transform = "translate(" + (it.x - it.w/2) + "px," + (it.y - it.h/2) + "px) rotate(" + it.rot + "deg)";
    }
    requestAnimationFrame(step);
  }

  /* ================= SPIN CONTROLS ================= */
  function setSpin(v){
    if(v){
      spinPower = 1;
      stopping = false;
    }
    if(v && !spinning){
      spinPower = 1;
      stopping = false;
      // al arrancar: cada ticket adopta una órbita partiendo de donde está
      for(var i=0;i<items.length;i++){
        var it = items[i];
        if(!it.alive) continue;
        it.baseX = it.x;
        var ny = (it.y - layer.clientHeight/2) / (layer.clientHeight/2 || 1);
        it.orb.th = Math.asin(Math.max(-1, Math.min(1, ny))) + (Math.random()-0.5)*0.8;
        it.orb.r = Math.max(0.76, Math.min(1.08, Math.abs(ny) + 0.38 + Math.random()*0.28));
      }
    }
    if(!v && spinning){
      stopping = true;
      document.getElementById("btnToggle").classList.remove("active");
      document.getElementById("btnStop").classList.add("active");
      return;
    }
    spinning = v;
    document.getElementById("btnToggle").classList.toggle("active", v);
    document.getElementById("btnStop").classList.remove("active");
  }

  document.getElementById("btnToggle").addEventListener("click", function(){ setSpin(true); });
  document.getElementById("btnStop").addEventListener("click", function(){ setSpin(false); });

      b.classList.add("active");
      mode = b.getAttribute("data-mode");
      buildItems();

  });

  /* ================= RESULT ================= */
  var overlay = document.getElementById("winnerOverlay");

  function showWinner(pick){
    lastWinner = pick;
    var winnerNumberEl = document.getElementById("winnerNumber");
    var winnerText = pick.phoneNumber || pick.phone || "Sin numero";
    winnerNumberEl.textContent = winnerText;
    winnerNumberEl.style.fontSize = winnerText.length > 14 ? "clamp(38px,5.2vw,86px)" : "";
    var winnerMeta = document.querySelector(".winner-card p");
    if(winnerMeta) winnerMeta.textContent = "";
    overlay.classList.add("show");
    document.getElementById("btnDestroy").disabled = false;
    launchConfetti();
  }

  document.getElementById("btnResult").addEventListener("click", function(){
    if(PARTICIPANTS.length === 0){ alert("No quedan participantes disponibles."); return; }
    setSpin(false);
    var pick = PARTICIPANTS[Math.floor(Math.random()*PARTICIPANTS.length)] || {};
    pendingWinner = pick;
    if(stopping || spinning || spinPower > 0.01){
      return;
    }
    pendingWinner = null;
    lastWinner = pick;
    document.getElementById("winnerNumber").textContent =
      (mode === "tickets") ? "Nº " + String(pick.num).padStart(6,"0") : pick.num;
    var winnerNumberEl = document.getElementById("winnerNumber");
    var winnerText = pick.phoneNumber || pick.phone || "Sin numero";
    winnerNumberEl.textContent = winnerText;
    winnerNumberEl.style.fontSize = winnerText.length > 14 ? "clamp(38px,5.2vw,86px)" : "";
    var winnerMeta = document.querySelector(".winner-card p");
    if(winnerMeta) winnerMeta.textContent = "";
    overlay.classList.add("show");
    document.getElementById("btnDestroy").disabled = false;
    launchConfetti();
  });

  document.getElementById("btnCloseWinner").addEventListener("click", function(){
    overlay.classList.remove("show");
  });
  overlay.addEventListener("click", function(){
    overlay.classList.remove("show");
  });

  /* ================= DESTROY ================= */
  document.getElementById("btnDestroy").addEventListener("click", function(){
    if(!lastWinner || !lastWinner.el) return;
    lastWinner.alive = false;
    lastWinner.el.style.transition = "transform .5s ease, opacity .5s ease";
    lastWinner.el.style.opacity = "0";
    var lw = lastWinner;
    setTimeout(function(){ if(lw.el.parentNode) lw.el.parentNode.removeChild(lw.el); }, 520);
    lastWinner = null;
    this.disabled = true;
    updateCount();
  });

  /* ================= CONFETTI ================= */
  var cCanvas = document.getElementById("confettiCanvas");
  var cCtx = cCanvas.getContext("2d");
  var confetti = [];
  var confettiRunning = false;

  function resizeCanvas(){ cCanvas.width = innerWidth; cCanvas.height = innerHeight; }
  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();

  function launchConfetti(){
    var colors = ["#F5087E","#f9e08a","#67c6ac","#ffffff","#ff8fc2","#d4a63b"];
    for(var i=0;i<220;i++){
      confetti.push({
        x: innerWidth/2 + (Math.random()-0.5)*300,
        y: innerHeight*0.28,
        vx: (Math.random()-0.5)*14,
        vy: -Math.random()*13 - 3,
        w: 6+Math.random()*7, h: 8+Math.random()*8,
        rot: Math.random()*360, vr:(Math.random()-0.5)*18,
        color: colors[Math.floor(Math.random()*colors.length)],
        life: 220
      });
    }
    if(!confettiRunning){ confettiRunning = true; confettiStep(); }
  }
  function confettiStep(){
    cCtx.clearRect(0,0,cCanvas.width,cCanvas.height);
    for(var i=confetti.length-1;i>=0;i--){
      var p = confetti[i];
      p.vy += 0.32; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life--;
      p.vx *= 0.99;
      cCtx.save();
      cCtx.translate(p.x,p.y);
      cCtx.rotate(p.rot*Math.PI/180);
      cCtx.globalAlpha = Math.max(0, Math.min(1, p.life/60));
      cCtx.fillStyle = p.color;
      cCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      cCtx.restore();
      if(p.life <= 0 || p.y > cCanvas.height + 40) confetti.splice(i,1);
    }
    if(confetti.length > 0){ requestAnimationFrame(confettiStep); }
    else { confettiRunning = false; cCtx.clearRect(0,0,cCanvas.width,cCanvas.height); }
  }

  /* ================= BULBS (marquee) ================= */
  function placeBulbs(){
    var holder = document.getElementById("bulbs");
    holder.innerHTML = "";
    var stage = document.querySelector(".stage");
    var w = stage.clientWidth, h = stage.clientHeight;
    var margin = 12;       // entre borde neón y borde dorado
    var margin = Math.max(18, Math.min(34, Math.min(w,h) * 0.018));
    var gap = Math.max(42, Math.min(68, Math.min(w,h) / 12));
    function addBulb(x,y,delay){
      var b = document.createElement("div");
      b.className = "bulb";
      b.style.left = (x-8)+"px";
      b.style.top = (y-8)+"px";
      b.style.animationDelay = (delay%2.4)+"s";
      holder.appendChild(b);
    }
    var d = 0;
    for(var x=margin+18; x<w-margin-18; x+=gap){ addBulb(x, margin, d+=.15); addBulb(x, h-margin, d+=.15); }
    for(var y=margin+18; y<h-margin-18; y+=gap){ addBulb(margin, y, d+=.15); addBulb(w-margin, y, d+=.15); }
  }
  window.addEventListener("resize", function(){ placeBulbs(); measure(); });
