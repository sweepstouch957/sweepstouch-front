<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweepstouch Standalone Demo</title>
<style>
  :root{
    --st-magenta:#F5087E;
    --button-magenta:#b90058;
    --bg-deep:#120006;
    --bg-mid:#69002c;
    --gold-1:#f9e08a;
    --gold-2:#d4a63b;
    --gold-3:#8a6a1d;
    --gold-dark:#3d2f0c;
    --panel:#1e1503;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;height:100dvh;overflow:hidden;}
  body{
    font-family:"Segoe UI", Arial, sans-serif;
    background:radial-gradient(ellipse at 50% 34%, #b20a55 0%, var(--bg-mid) 30%, var(--bg-deep) 66%, #030001 100%);
    display:flex;align-items:center;justify-content:center;
    user-select:none;
  }

  /* ============ FRAME ============ */
  .stage{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;}
  .frame{
    position:absolute;inset:28px;
    border-radius:48px;
    border:4px solid var(--gold-2);
    box-shadow:
      0 0 14px 3px rgba(249,224,138,.82),
      0 0 48px 8px rgba(212,166,59,.42),
      inset 0 0 20px 3px rgba(249,224,138,.38);
  }
  .frame-gold{
    position:absolute;inset:48px;
    border-radius:36px;
    border:5px solid var(--gold-2);
    box-shadow:
      inset 0 0 0 2px var(--gold-3),
      0 0 0 2px var(--gold-3),
      inset 0 0 40px rgba(0,0,0,.35);
  }
  .bulb{
    position:absolute;width:18px;height:18px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #ffffff 0%, #fff3c4 35%, #ffd76e 70%, #d4a63b 100%);
    box-shadow:
      0 0 8px 3px rgba(255,248,220,1),
      0 0 20px 8px rgba(255,225,140,.95),
      0 0 44px 16px rgba(255,205,110,.55),
      0 0 70px 26px rgba(255,190,90,.25);
    animation:twinkle 1.65s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{filter:brightness(1.35);opacity:1;}
    45%{filter:brightness(.45);opacity:.45;}
    65%{filter:brightness(1.75);opacity:1;}
  }

  .draw-header{
    position:absolute;left:50%;top:clamp(32px,7.2vh,92px);transform:translateX(-50%);
    z-index:22;width:min(1200px,82vw);text-align:center;color:#fff;pointer-events:none;
  }

  .ticket .brand,.ticket .num,.t-cream .brand,.t-cream .num,.t-teal .brand,.t-teal .num{display:none;}
  .ball{
    width:56px;height:56px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:19px;color:#333;
    box-shadow:inset -5px -8px 12px rgba(0,0,0,.25), inset 6px 8px 10px rgba(255,255,255,.65), 0 4px 8px rgba(0,0,0,.3);
  }
  .ball .n{background:rgba(255,255,255,.85);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;}

  /* ============ CONTROLS ============ */
  .fullscreen-btn{
    position:fixed;right:max(12px,env(safe-area-inset-right));top:max(12px,env(safe-area-inset-top));
    z-index:35;padding:8px 12px;border-radius:999px;border:1px solid rgba(249,224,138,.42);
    background:rgba(255,255,255,.08);color:rgba(255,255,255,.72);font-size:12px;font-weight:800;
    backdrop-filter:blur(6px);cursor:pointer;
  }
  .fullscreen-btn:hover{background:rgba(255,255,255,.16);color:#fff;}
  :fullscreen .fullscreen-btn{display:none;}

  .controls{
    position:absolute;left:50%;bottom:8vh;transform:translateX(-50%);
    display:flex;flex-direction:column;gap:16px;align-items:center;z-index:20;
  }
  .row{display:flex;gap:22px;}
  .btn{
    min-width:clamp(128px,9vw,170px);padding:clamp(10px,1.1vw,14px) clamp(16px,1.8vw,26px);border-radius:999px;cursor:pointer;
    font-family:inherit;font-size:clamp(15px,1.05vw,19px);font-weight:900;letter-spacing:.5px;color:var(--button-magenta);
    background:linear-gradient(180deg,#ffffff 0%,#fff7fb 52%,#ffffff 100%);
    border:2px solid var(--gold-1);
    text-transform:none;
    box-shadow:
      0 0 0 1px rgba(212,166,59,.72),
      0 0 14px 3px rgba(249,224,138,.72),
      0 0 30px 8px rgba(212,166,59,.38),
      0 8px 18px rgba(0,0,0,.28),
      inset 0 1px 2px rgba(255,255,255,.85);
    transition:transform .12s ease, box-shadow .12s ease, background .2s;
  }
  .btn:hover{
    transform:translateY(-2px);
    box-shadow:
      0 0 0 1px rgba(255,238,170,.95),
      0 0 20px 5px rgba(249,224,138,.95),
      0 0 42px 12px rgba(212,166,59,.55),
      0 10px 20px rgba(0,0,0,.32),
      inset 0 1px 2px rgba(255,255,255,.9);
  }
  .btn:active{transform:translateY(1px);}
  .btn.active{
    background:linear-gradient(180deg,#ff2f92 0%,var(--st-magenta) 55%,#c00458 100%);
    color:#ffffff;border-color:var(--gold-1);
    box-shadow:
      0 0 0 1px rgba(255,238,170,1),
      0 0 24px 6px rgba(249,224,138,1),
      0 0 46px 14px rgba(212,166,59,.58),
      inset 0 1px 2px rgba(255,255,255,.95);
  }
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
  #mBallsNum,#mBalls,#mTickets,#btnDestroy{display:none;}

  /* ============ WINNER ============ */
  .winner-overlay{
    position:fixed;inset:0;background:rgba(60,0,32,.78);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:50;
  }
  .winner-overlay.show{display:flex;}

    var winnerNumberEl = document.getElementById("winnerNumber");
    var winnerText = pick.phoneNumber || pick.phone || "Sin numero";
    winnerNumberEl.textContent = winnerText;
    winnerNumberEl.style.fontSize = winnerText.length > 14 ? "clamp(38px,5.2vw,86px)" : "";
    var winnerMeta = document.querySelector(".winner-card p");
    if(winnerMeta) winnerMeta.textContent = "";
    overlay.classList.add("show");
    document.getElementById("btnDestroy").disabled = false;
    launchConfetti();
  }

  document.getElementById("btnResult").addEventListener("click", function(){
    if(PARTICIPANTS.length === 0){ alert("No quedan participantes disponibles."); return; }
    setSpin(false);
    var pick = PARTICIPANTS[Math.floor(Math.random()*PARTICIPANTS.length)] || {};
    pendingWinner = pick;
    if(stopping || spinning || spinPower > 0.01){
      return;
    }
    pendingWinner = null;
    lastWinner = pick;
    document.getElementById("winnerNumber").textContent =
      (mode === "tickets") ? "NÂº " + String(pick.num).padStart(6,"0") : pick.num;

    winnerNumberEl.textContent = winnerText;
    winnerNumberEl.style.fontSize = winnerText.length > 14 ? "clamp(38px,5.2vw,86px)" : "";
    var winnerMeta = document.querySelector(".winner-card p");

    document.getElementById("btnDestroy").disabled = false;
    launchConfetti();

  /* ================= DESTROY ================= */
  document.getElementById("btnDestroy").addEventListener("click", function(){
    if(!lastWinner || !lastWinner.el) return;
    lastWinner.alive = false;
    lastWinner.el.style.transition = "transform .5s ease, opacity .5s ease";
    lastWinner.el.style.opacity = "0";
    var lw = lastWinner;
    setTimeout(function(){ if(lw.el.parentNode) lw.el.parentNode.removeChild(lw.el); }, 520);
    lastWinner = null;
    this.disabled = true;
    updateCount();
  });

  /* ================= CONFETTI ================= */
  var cCanvas = document.getElementById("confettiCanvas");
  var cCtx = cCanvas.getContext("2d");
  var confetti = [];
  var confettiRunning = false;

  function resizeCanvas(){ cCanvas.width = innerWidth; cCanvas.height = innerHeight; }
  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();

  function launchConfetti(){
    var colors = ["#F5087E","#f9e08a","#67c6ac","#ffffff","#ff8fc2","#d4a63b"];
    var total = perf.confetti || 220;
    for(var i=0;i<total;i++){
      confetti.push({
        x: innerWidth/2 + (Math.random()-0.5)*300,
        y: innerHeight*0.28,
        vx: (Math.random()-0.5)*14,
        vy: -Math.random()*13 - 3,
        w: 6+Math.random()*7, h: 8+Math.random()*8,
        rot: Math.random()*360, vr:(Math.random()-0.5)*18,
        color: colors[Math.floor(Math.random()*colors.length)],
        life: 220
      });
    }
    if(!confettiRunning){ confettiRunning = true; confettiStep(); }
  }
  function confettiStep(){
    cCtx.clearRect(0,0,cCanvas.width,cCanvas.height);
    for(var i=confetti.length-1;i>=0;i--){
      var p = confetti[i];
      p.vy += 0.32; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life--;
      p.vx *= 0.99;
      cCtx.save();
      cCtx.translate(p.x,p.y);
      cCtx.rotate(p.rot*Math.PI/180);
      cCtx.globalAlpha = Math.max(0, Math.min(1, p.life/60));
      cCtx.fillStyle = p.color;
      cCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      cCtx.restore();
      if(p.life <= 0 || p.y > cCanvas.height + 40) confetti.splice(i,1);
    }
    if(confetti.length > 0){ requestAnimationFrame(confettiStep); }
    else { confettiRunning = false; cCtx.clearRect(0,0,cCanvas.width,cCanvas.height); }
  }

  /* ================= BULBS (marquee) ================= */
  function placeBulbs(){
    var holder = document.getElementById("bulbs");
    holder.innerHTML = "";
    var stage = document.querySelector(".stage");
    var w = stage.clientWidth, h = stage.clientHeight;
    var margin = Math.max(18, Math.min(34, Math.min(w,h) * 0.018));
    var gap = Math.max(perf.bulbGapMin || 42, Math.min(perf.bulbGapMax || 68, Math.min(w,h) / (perf.compact ? 8.5 : 12)));
    var bulbSize = perf.compact ? 12 : 18;
    function addBulb(x,y,delay){
      var b = document.createElement("div");
      b.className = "bulb";
      b.style.left = (x - bulbSize / 2)+"px";
      b.style.top = (y - bulbSize / 2)+"px";
      b.style.animationDelay = (delay%2.4)+"s";
      holder.appendChild(b);
    }
    var d = 0;
    for(var x=margin+18; x<w-margin-18; x+=gap){ addBulb(x, margin, d+=.15); addBulb(x, h-margin, d+=.15); }
    for(var y=margin+18; y<h-margin-18; y+=gap){ addBulb(margin, y, d+=.15); addBulb(w-margin, y, d+=.15); }
  }
  var resizeTimer = null;
  window.addEventListener("resize", function(){
    refreshPerfProfile();
    placeBulbs();
    measure();
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){
      var oldCount = items.length;
      refreshPerfProfile();
      measure();
      if(Math.abs((perf.visualItems || oldCount) - oldCount) > 24){
        buildItems();
      } else {
        assignRest(true);
        renderItems();
      }
    }, 160);
  });
